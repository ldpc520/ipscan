version: "3.8"

services:
  ipscan:
    image: ken01982/ipscan:latest
    container_name: ipscan
    restart: unless-stopped
    ports:
      - "6603:6603"
    environment:
      - CONFIG_PASSWORD=admin
      - ENABLE_SCANNER=1
      - SCAN_INTERVAL=900
    volumes:
      - ./data:/app/data
      - ./组播ID:/app/组播ID
