# .github/workflows/docker-build.yml
# 自动构建 Docker 镜像并推送到 GitHub Container Registry

name: Build and Push Docker Image

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'  # 推送 tag 如 v1.0.0 时触发
  pull_request:
    branches: [main, master]
  # 手动触发
  workflow_dispatch:

env:
  # 镜像注册表：ghcr.io (GitHub Container Registry)
  REGISTRY: ghcr.io
  # 镜像名：用户名/仓库名（小写）
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # 推送镜像所需权限

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 QEMU（多架构支持）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取元数据（标签和注解）
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64  # 同时构建 amd64 和 arm64
          push: ${{ github.event_name != 'pull_request' }}  # PR 时不推送，只验证构建
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
